name: Init Integration Test
on:
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Enable Corepack
        run: corepack enable

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: yarn

      - name: Build monorepo
        run: |
          yarn install --immutable
          yarn build

      - name: Pack local packages
        run: |
          yarn workspace letsrunit pack --out /tmp/letsrunit.tgz
          yarn workspace @letsrunit/ai pack --out /tmp/ai.tgz
          yarn workspace @letsrunit/bdd pack --out /tmp/bdd.tgz
          yarn workspace @letsrunit/mcp-server pack --out /tmp/mcp-server.tgz
          yarn workspace @letsrunit/cucumber pack --out /tmp/cucumber.tgz
          yarn workspace @letsrunit/cli pack --out /tmp/cli.tgz
          yarn workspace @letsrunit/controller pack --out /tmp/controller.tgz
          yarn workspace @letsrunit/executor pack --out /tmp/executor.tgz
          yarn workspace @letsrunit/gherker pack --out /tmp/gherker.tgz
          yarn workspace @letsrunit/gherkin pack --out /tmp/gherkin.tgz
          yarn workspace @letsrunit/journal pack --out /tmp/journal.tgz
          yarn workspace @letsrunit/mailbox pack --out /tmp/mailbox.tgz
          yarn workspace @letsrunit/playwright pack --out /tmp/playwright.tgz
          yarn workspace @letsrunit/store pack --out /tmp/store.tgz
          yarn workspace @letsrunit/utils pack --out /tmp/utils.tgz

      - uses: actions/upload-artifact@v6
        with:
          name: tarballs
          path: |
            /tmp/letsrunit.tgz
            /tmp/ai.tgz
            /tmp/bdd.tgz
            /tmp/mcp-server.tgz
            /tmp/cucumber.tgz
            /tmp/cli.tgz
            /tmp/controller.tgz
            /tmp/executor.tgz
            /tmp/gherker.tgz
            /tmp/gherkin.tgz
            /tmp/journal.tgz
            /tmp/mailbox.tgz
            /tmp/playwright.tgz
            /tmp/store.tgz
            /tmp/utils.tgz

  init:
    name: Init (${{ matrix.pm }})
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.57.0-noble
    needs: build
    strategy:
      fail-fast: false
      matrix:
        pm: [npm, yarn, pnpm, bun]

    steps:
      - name: Enable Corepack
        run: corepack enable

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - uses: pnpm/action-setup@v5
        if: matrix.pm == 'pnpm'
        with:
          version: latest

      - name: Install Bun prerequisites
        if: matrix.pm == 'bun'
        run: |
          apt-get update
          apt-get install -y unzip build-essential

      - uses: oven-sh/setup-bun@v2
        if: matrix.pm == 'bun'

      - uses: actions/download-artifact@v7
        with:
          name: tarballs
          path: /tmp

      - name: Create test project
        run: |
          mkdir -p /tmp/test-${{ matrix.pm }}
          cp /tmp/letsrunit.tgz   /tmp/test-${{ matrix.pm }}/letsrunit.tgz
          cp /tmp/ai.tgz          /tmp/test-${{ matrix.pm }}/ai.tgz
          cp /tmp/bdd.tgz         /tmp/test-${{ matrix.pm }}/bdd.tgz
          cp /tmp/cucumber.tgz    /tmp/test-${{ matrix.pm }}/cucumber.tgz
          cp /tmp/cli.tgz         /tmp/test-${{ matrix.pm }}/cli.tgz
          cp /tmp/controller.tgz  /tmp/test-${{ matrix.pm }}/controller.tgz
          cp /tmp/executor.tgz    /tmp/test-${{ matrix.pm }}/executor.tgz
          cp /tmp/gherker.tgz     /tmp/test-${{ matrix.pm }}/gherker.tgz
          cp /tmp/gherkin.tgz     /tmp/test-${{ matrix.pm }}/gherkin.tgz
          cp /tmp/journal.tgz     /tmp/test-${{ matrix.pm }}/journal.tgz
          cp /tmp/mailbox.tgz     /tmp/test-${{ matrix.pm }}/mailbox.tgz
          cp /tmp/playwright.tgz  /tmp/test-${{ matrix.pm }}/playwright.tgz
          cp /tmp/store.tgz       /tmp/test-${{ matrix.pm }}/store.tgz
          cp /tmp/utils.tgz       /tmp/test-${{ matrix.pm }}/utils.tgz
          node -e "
            const fs = require('fs');
            const pm = '${{ matrix.pm }}';
            const localOverrides = {
              'letsrunit':              'file:./letsrunit.tgz',
              '@letsrunit/ai':          'file:./ai.tgz',
              '@letsrunit/bdd':         'file:./bdd.tgz',
              '@letsrunit/cucumber':    'file:./cucumber.tgz',
              '@letsrunit/cli':         'file:./cli.tgz',
              '@letsrunit/controller':  'file:./controller.tgz',
              '@letsrunit/executor':    'file:./executor.tgz',
              '@letsrunit/gherker':     'file:./gherker.tgz',
              '@letsrunit/gherkin':     'file:./gherkin.tgz',
              '@letsrunit/journal':     'file:./journal.tgz',
              '@letsrunit/mailbox':     'file:./mailbox.tgz',
              '@letsrunit/playwright':  'file:./playwright.tgz',
              '@letsrunit/store':       'file:./store.tgz',
              '@letsrunit/utils':       'file:./utils.tgz',
            };
            const pkg = {
              name: 'test-project',
              version: '1.0.0',
              private: true,
              type: 'module',
              dependencies: {
                '@letsrunit/cli':          'file:./cli.tgz',
                '@letsrunit/cucumber':     'file:./cucumber.tgz',
                '@cucumber/cucumber':      '*',
                'playwright':              '*'
              }
            };
            if (pm === 'yarn') {
              pkg.packageManager = 'yarn@1.22.22';
              pkg.resolutions = localOverrides;
            }
            if (pm === 'pnpm') {
              pkg.pnpm = { overrides: localOverrides };
            }
            if (pm === 'npm' || pm === 'bun') {
              pkg.overrides = localOverrides;
            }
            fs.writeFileSync('/tmp/test-' + pm + '/package.json', JSON.stringify(pkg, null, 2));
          "

      - name: Install dependencies
        working-directory: /tmp/test-${{ matrix.pm }}
        run: |
          case "${{ matrix.pm }}" in
            npm)  npm install ;;
            yarn) yarn install ;;
            pnpm) pnpm install ;;
            bun)  bun install ;;
          esac

      - name: Run init
        working-directory: /tmp/test-${{ matrix.pm }}
        run: npx -y file:./letsrunit.tgz init --yes

      - name: Start web server
        run: |
          node -e "require('http').createServer((_, res) => { res.setHeader('Content-Type', 'text/html'); res.end('<html><body><h1>Welcome</h1></body></html>'); }).listen(3000)" &
          curl --retry 5 --retry-delay 1 --retry-connrefused -sf http://127.0.0.1:3000/

      - name: Run Cucumber
        working-directory: /tmp/test-${{ matrix.pm }}
        run: npx cucumber-js

      - name: CLI smoke test
        working-directory: /tmp/test-${{ matrix.pm }}
        run: |
          case "${{ matrix.pm }}" in
            npm)  npx letsrunit --help ;;
            yarn) yarn letsrunit --help ;;
            pnpm) pnpm exec letsrunit --help ;;
            bun)  bunx letsrunit --help ;;
          esac
        
  mcp-server-integration:
    name: MCP Server Integration
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.57.0-noble
    needs: build
    steps:
      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - uses: actions/download-artifact@v7
        with:
          name: tarballs
          path: /tmp

      - name: MCP integration (packaged server + core tools)
        shell: bash
        run: |
          set -euo pipefail

          node -e "require('http').createServer((req, res) => { res.setHeader('Content-Type', 'text/html'); res.end('<html><head><title>MCP Test</title></head><body><h1>Welcome</h1><button>Click me</button></body></html>'); }).listen(3000)" >/tmp/mcp-demo.log 2>&1 &
          DEMO_PID=$!
          trap 'kill "$DEMO_PID" 2>/dev/null || true' EXIT
          curl --retry 10 --retry-delay 1 --retry-connrefused -sf http://127.0.0.1:3000/

          mkdir -p /tmp/mcp-int
          cat >/tmp/mcp-int/package.json <<'EOF'
          {
            "name": "mcp-int",
            "private": true,
            "type": "module",
            "dependencies": {
              "@modelcontextprotocol/sdk": "^1.18.2"
            }
          }
          EOF
          (cd /tmp/mcp-int && npm install --no-audit --no-fund)

          cat >/tmp/mcp-int/run.mjs <<'EOF'
          import { Client } from '@modelcontextprotocol/sdk/client/index.js';
          import { StdioClientTransport } from '@modelcontextprotocol/sdk/client/stdio.js';

          function parseToolResponse(response) {
            if (!response || response.isError) {
              return { isError: true, value: response?.content?.[0]?.text ?? response };
            }
            const text = response.content?.[0]?.text;
            if (typeof text !== 'string') return { isError: false, value: response };
            try {
              return { isError: false, value: JSON.parse(text) };
            } catch {
              return { isError: false, value: text };
            }
          }

          async function callTool(client, name, args) {
            const result = await client.callTool({ name, arguments: args });
            const parsed = parseToolResponse(result);
            if (parsed.isError) {
              throw new Error(`${name} failed: ${JSON.stringify(parsed.value)}`);
            }
            return parsed.value;
          }

          const transport = new StdioClientTransport({
            command: 'npx',
            args: ['-y', 'file:/tmp/mcp-server.tgz'],
            stderr: 'pipe',
          });
          transport.stderr?.on('data', (chunk) => process.stderr.write(chunk));

          const client = new Client({ name: 'mcp-integration', version: '1.0.0' });
          await client.connect(transport);

          try {
            const { tools } = await client.listTools();
            if (!tools.some((tool) => tool.name === 'letsrunit_session_start')) {
              throw new Error('Missing letsrunit_session_start tool');
            }

            const started = await callTool(client, 'letsrunit_session_start', {
              baseURL: 'http://127.0.0.1:3000',
              headless: true,
            });
            if (!started?.sessionId || typeof started.sessionId !== 'string') {
              throw new Error(`Invalid session_start response: ${JSON.stringify(started)}`);
            }
            const { sessionId } = started;

            const runResult = await callTool(client, 'letsrunit_run', {
              sessionId,
              input: `Given I'm on the homepage\nThen the page contains text "Welcome"`,
            });
            if (runResult?.status !== 'passed') {
              throw new Error(`Run did not pass: ${JSON.stringify(runResult)}`);
            }

            const snapshotResult = await callTool(client, 'letsrunit_snapshot', {
              sessionId,
              scrubScripts: true,
              scrubStyles: true,
              scrubComments: true,
            });
            if (!snapshotResult?.html || typeof snapshotResult.html !== 'string') {
              throw new Error(`Snapshot did not return html: ${JSON.stringify(snapshotResult)}`);
            }

            const screenshotResult = await callTool(client, 'letsrunit_screenshot', { sessionId });
            if (!screenshotResult?.path || typeof screenshotResult.path !== 'string') {
              throw new Error(`Screenshot did not return path: ${JSON.stringify(screenshotResult)}`);
            }

            const listed = await callTool(client, 'letsrunit_list_sessions', {});
            if (!Array.isArray(listed?.sessions) || !listed.sessions.some((session) => session.id === sessionId)) {
              throw new Error(`Session not found in list_sessions: ${JSON.stringify(listed)}`);
            }

            await callTool(client, 'letsrunit_session_close', { sessionId });
          } finally {
            await client.close();
          }
          EOF

          node /tmp/mcp-int/run.mjs
