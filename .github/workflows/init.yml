name: Init Integration Test
on:
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Enable Corepack
        run: corepack enable

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: yarn

      - name: Build monorepo
        run: |
          yarn install --immutable
          yarn build

      - name: Pack local packages
        run: |
          yarn workspace letsrunit pack --out /tmp/letsrunit.tgz
          yarn workspace @letsrunit/ai pack --out /tmp/ai.tgz
          yarn workspace @letsrunit/bdd pack --out /tmp/bdd.tgz
          yarn workspace @letsrunit/mcp-server pack --out /tmp/mcp-server.tgz
          yarn workspace @letsrunit/cucumber pack --out /tmp/cucumber.tgz
          yarn workspace @letsrunit/cli pack --out /tmp/cli.tgz
          yarn workspace @letsrunit/controller pack --out /tmp/controller.tgz
          yarn workspace @letsrunit/executor pack --out /tmp/executor.tgz
          yarn workspace @letsrunit/gherker pack --out /tmp/gherker.tgz
          yarn workspace @letsrunit/gherkin pack --out /tmp/gherkin.tgz
          yarn workspace @letsrunit/journal pack --out /tmp/journal.tgz
          yarn workspace @letsrunit/mailbox pack --out /tmp/mailbox.tgz
          yarn workspace @letsrunit/playwright pack --out /tmp/playwright.tgz
          yarn workspace @letsrunit/store pack --out /tmp/store.tgz
          yarn workspace @letsrunit/utils pack --out /tmp/utils.tgz

      - uses: actions/upload-artifact@v6
        with:
          name: tarballs
          path: |
            /tmp/letsrunit.tgz
            /tmp/ai.tgz
            /tmp/bdd.tgz
            /tmp/mcp-server.tgz
            /tmp/cucumber.tgz
            /tmp/cli.tgz
            /tmp/controller.tgz
            /tmp/executor.tgz
            /tmp/gherker.tgz
            /tmp/gherkin.tgz
            /tmp/journal.tgz
            /tmp/mailbox.tgz
            /tmp/playwright.tgz
            /tmp/store.tgz
            /tmp/utils.tgz

  init:
    name: Init (${{ matrix.pm }})
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-noble
    needs: build
    strategy:
      fail-fast: false
      matrix:
        pm: [npm, yarn, pnpm, bun]

    steps:
      - uses: actions/checkout@v6

      - name: Enable Corepack
        run: corepack enable

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - uses: pnpm/action-setup@v5
        if: matrix.pm == 'pnpm'
        with:
          version: latest

      - name: Install Bun prerequisites
        if: matrix.pm == 'bun'
        run: |
          apt-get update
          apt-get install -y unzip build-essential

      - uses: oven-sh/setup-bun@v2
        if: matrix.pm == 'bun'

      - uses: actions/download-artifact@v7
        with:
          name: tarballs
          path: /tmp

      - name: Create test project
        run: |
          node .github/scripts/init/create-test-project.mjs \
            --pm "${{ matrix.pm }}" \
            --tarballs-dir /tmp \
            --target-dir "/tmp/test-${{ matrix.pm }}"

      - name: Install dependencies
        working-directory: /tmp/test-${{ matrix.pm }}
        run: |
          case "${{ matrix.pm }}" in
            npm)  npm install ;;
            yarn) yarn install ;;
            pnpm) pnpm install ;;
            bun)  bun install ;;
          esac

      - name: Run init
        working-directory: /tmp/test-${{ matrix.pm }}
        run: npx -y file:./letsrunit.tgz init --yes

      - name: Start web server
        shell: bash
        run: |
          set -euo pipefail
          node -e "require('http').createServer((_, res) => { res.setHeader('Content-Type', 'text/html'); res.end('<html><body><h1>Welcome</h1></body></html>'); }).listen(3000)" >/tmp/init-demo.log 2>&1 &
          DEMO_PID=$!
          trap 'kill "$DEMO_PID" 2>/dev/null || true' EXIT
          curl --retry 10 --retry-delay 1 --retry-connrefused -sf http://127.0.0.1:3000/

      - name: Run Cucumber
        working-directory: /tmp/test-${{ matrix.pm }}
        run: npx cucumber-js

      - name: CLI smoke test
        working-directory: /tmp/test-${{ matrix.pm }}
        run: |
          case "${{ matrix.pm }}" in
            npm)  npx letsrunit --help ;;
            yarn) yarn letsrunit --help ;;
            pnpm) pnpm exec letsrunit --help ;;
            bun)  bunx letsrunit --help ;;
          esac

  mcp-server-integration:
    name: MCP Server Integration
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-noble
    env:
      PLAYWRIGHT_BROWSERS_PATH: /ms-playwright
    needs: build
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - uses: actions/download-artifact@v7
        with:
          name: tarballs
          path: /tmp

      - name: MCP integration (npx tools/list)
        shell: bash
        run: |
          set -euo pipefail
          cp .github/scripts/mcp/run-npx-tools-list.mjs /tmp/mcp-int/run-npx-tools-list.mjs
          node /tmp/mcp-int/run-npx-tools-list.mjs --package file:/tmp/mcp-server.tgz

      - name: MCP integration (deterministic full flow)
        shell: bash
        run: |
          set -euo pipefail

          node -e "require('http').createServer((req, res) => { res.setHeader('Content-Type', 'text/html'); res.end('<html><head><title>MCP Test</title></head><body><h1>Welcome</h1><button>Click me</button></body></html>'); }).listen(3000)" >/tmp/mcp-demo.log 2>&1 &
          DEMO_PID=$!
          trap 'kill "$DEMO_PID" 2>/dev/null || true' EXIT
          curl --retry 10 --retry-delay 1 --retry-connrefused -sf http://127.0.0.1:3000/

          mkdir -p /tmp/mcp-int
          cat >/tmp/mcp-int/package.json <<'EOF'
          {
            "name": "mcp-int",
            "private": true,
            "type": "module",
            "dependencies": {
              "@letsrunit/mcp-server": "file:/tmp/mcp-server.tgz",
              "@modelcontextprotocol/sdk": "^1.26.0"
            }
          }
          EOF
          (cd /tmp/mcp-int && npm install --no-audit --no-fund)
          (cd /tmp/mcp-int && npx playwright install chromium)
          cp .github/scripts/mcp/run-deterministic-flow.mjs /tmp/mcp-int/run-deterministic-flow.mjs
          node /tmp/mcp-int/run-deterministic-flow.mjs \
            --server /tmp/mcp-int/node_modules/@letsrunit/mcp-server/dist/index.js \
            --baseUrl http://127.0.0.1:3000
